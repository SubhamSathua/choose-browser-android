<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="src/img/error.png">

    <title>Page Not Available</title>
    <style>
        * {
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            -webkit-touch-callout: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1e1e20;
            --card: #252527;
            --text: #e4e6eb;
            --sub: #b0b3b8;
            --accent: #377aff;
        }

        @font-face {
            font-family: 'poppins';
            src: url('src/poppins_regular.ttf');
        }

        body {
            font-family: 'poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            border-radius: 20px;
            padding: 32px 24px;
            margin: 20px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        h1 {
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .error-code {
            font-size: 12px;
            color: var(--sub);
            background: rgba(255, 255, 255, 0.06);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-family: monospace;
        }

        p {
            font-size: 14px;
            color: var(--sub);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .retry-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-family: 'poppins', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .retry-btn:active {
            opacity: 0.7;
        }

        .tips {
            margin-top: 24px;
            text-align: left;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 16px;
        }

        .tips h2 {
            font-size: 13px;
            margin-bottom: 10px;
            color: var(--text);
        }

        .tips li {
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 6px;
            margin-left: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🔌</div>
        <h1>Can't reach this page</h1>
        <div class="error-code" id="errorCode">NET_ERROR</div>
        <p id="errorDesc">The page failed to load. Check your connection and try again.</p>
        <button class="retry-btn" onclick="window.history.back()">Go Back</button>
        <div class="tips">
            <h2>Things to try:</h2>
            <ul>
                <li>Check your internet connection</li>
                <li>Make sure the URL is correct</li>
                <li>Try disabling ad/tracker blocking</li>
                <li>The site may be temporarily down</li>
                <li>Try enabling JavaScript</li>
            </ul>
        </div>
    </div>
    <script>
        // Read error info from URL params
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const desc = params.get('desc');
        const url = params.get('url');
        if (code) document.getElementById('errorCode').textContent = code;
        if (desc) document.getElementById('errorDesc').textContent = desc;
    </script>
</body>

</html>
